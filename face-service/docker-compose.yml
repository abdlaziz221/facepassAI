services:
  face-service:
    build: .
    container_name: facepass-face-service
    ports:
      - "8001:8001"
    environment:
      - MATCH_THRESHOLD=0.6
      - LARAVEL_ORIGIN=http://host.docker.internal:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
